<svg width="800" height="100" viewBox="0 0 800 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .marquee {
      font: 600 20px 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      fill: #ffffff;
      white-space: pre;
      animation: scroll 20s linear infinite;
    }
    @keyframes scroll {
      0% { transform: translateX(800px); }
      100% { transform: translateX(-100% - 800px); }
    }
  </style>
  <text y="50" class="marquee">
    REACT • NEXT.JS • TYPESCRIPT • NODE.JS • RUST • PYTHON • DOCKER • AWS • KUBERNETES • GRAPHQL • TAILWIND CSS • POSTGRESQL • MONGODB • REDIS • TRPC
  </text>
</svg>
